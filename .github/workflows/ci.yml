name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server — check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: Syntax check
        run: node --check server.js
      - name: Unit tests (Vitest, offline)
        run: npm test

  client:
    name: Client — production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
